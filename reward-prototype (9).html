<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Archie — Reward Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#020810;color:#E8F2FF;font-family:'Inter',sans-serif;overflow:hidden;}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.9}}
.page{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;}
.phone{width:390px;height:780px;background:#0d1117;border-radius:50px;padding:14px;box-shadow:0 0 0 1px #1e3a5f,0 0 60px rgba(74,144,226,0.15),0 30px 80px rgba(0,0,0,0.9);flex-shrink:0;}
.phone-notch{width:100px;height:24px;background:#0d1117;border-radius:0 0 16px 16px;margin:0 auto;position:relative;z-index:2;}
.phone-inner{width:100%;height:714px;background:#000;border-radius:38px;overflow:hidden;position:relative;}

/* Reward overlay */
.reward-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,1);
  display:flex;z-index:10;
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:2rem 2rem 1.5rem;
  overflow-y:auto;
}

/* Archie container */
.archie-mini{opacity:0;transition:opacity 0.8s ease;animation:none;}
.archie-mini.visible{opacity:1;}
@keyframes softBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(74,144,226,0.3))}50%{filter:drop-shadow(0 0 20px rgba(74,144,226,0.6))}}
@keyframes antennaPulse{0%,100%{opacity:0.15}50%{opacity:0.6}}

/* Foot glow */
@keyframes footPulse{0%,100%{opacity:0.05}50%{opacity:0.15}}

/* Power-up sweep animation */
@keyframes sweepUp{
  0%{stop-color:rgba(74,144,226,0);offset:0%}
  100%{stop-color:rgba(74,144,226,0.15);offset:100%}
}

/* Eye flicker */
@keyframes eyeFlicker{
  0%{opacity:0}
  10%{opacity:0.8}
  20%{opacity:0.1}
  35%{opacity:0.9}
  45%{opacity:0.2}
  60%{opacity:1}
  100%{opacity:1}
}

/* Chest dial spin */
@keyframes dialSpin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(720deg)}
}

/* Body glow pulse after boot */
@keyframes bodyGlow{
  0%{opacity:0}
  50%{opacity:0.12}
  100%{opacity:0.06}
}

/* Antenna fire */
@keyframes antennaFire{
  0%{opacity:0.15;r:4}
  30%{opacity:1;r:6}
  60%{opacity:0.9;r:5}
  100%{opacity:0.7;r:5}
}

/* Foot glow */
@keyframes footPulse{0%{opacity:0.05}50%{opacity:0.3}100%{opacity:0.15}}

/* Reward text */
.reward-text{opacity:0;transition:opacity 1.2s ease;font-size:15px;color:#93C5FD;text-align:center;line-height:1.6;}
.reward-text.visible{opacity:1;}
.reward-text .big{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#E8F2FF;display:block;margin:0.25rem 0;}
.reward-text .highlight{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#4A90E2;}

/* Progress bump */
.progress-bump{
  background:#0d1f3c;border:1px solid #1E40AF;border-radius:12px;
  padding:12px 20px;text-align:center;width:100%;
  opacity:0;transition:opacity 1s ease;
}
.progress-bump.visible{opacity:1;}
.progress-bump .pct{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:#4A90E2;}
.progress-bump .label{font-size:10px;color:#7BB3F0;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.progress-bump .bar-w{width:100%;background:#0A1628;border-radius:3px;height:4px;margin-top:8px;overflow:hidden;}
.progress-bump .bar-f{height:100%;background:linear-gradient(90deg,#1E40AF,#4A90E2,#93C5FD);border-radius:3px;width:0%;transition:width 1.5s ease;}

/* CTA */
.btn-primary{
  display:inline-block;padding:14px 36px;border-radius:30px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.5px;
  border:none;background:linear-gradient(135deg,#1E40AF,#4A90E2);color:#E8F2FF;
  box-shadow:0 0 20px rgba(74,144,226,0.3);
  opacity:0;transition:opacity 1s ease;
}
.btn-primary.visible{opacity:1;}
.btn-primary:hover{box-shadow:0 0 30px rgba(74,144,226,0.5);transform:translateY(-1px);}

/* Trigger button for testing */
.trigger-btn{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  padding:12px 28px;border-radius:20px;border:1px solid #3a6a9a;
  background:transparent;color:#7BB3F0;font-size:13px;cursor:pointer;
  font-family:'Inter',sans-serif;z-index:100;
}
.trigger-btn:hover{border-color:#4A90E2;color:#93C5FD;}
</style>
</head>

<script>
// Stars
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var s=document.createElement('div');
    s.className='star';
    var size=Math.random()*2+0.5;
    s.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(Math.random()*0.4+0.1)+';animation:twinkle '+(Math.random()*3+2)+'s infinite '+Math.random()*3+'s;';
    c.appendChild(s);
  }
})();

// ================================
// AUDIO
// ================================
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// Sound 1: Power-up build — vrrrrRRRRRRRm (~1.7s)
function sfxReward(){
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;

    // Main triangle sweep
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    osc.type='triangle';
    osc.frequency.setValueAtTime(60,t);
    osc.frequency.exponentialRampToValueAtTime(200,t+0.5);
    osc.frequency.exponentialRampToValueAtTime(600,t+1.3);
    osc.frequency.exponentialRampToValueAtTime(900,t+1.5);
    gain.gain.setValueAtTime(0.0,t);
    gain.gain.linearRampToValueAtTime(0.02,t+0.15);
    gain.gain.linearRampToValueAtTime(0.06,t+0.5);
    gain.gain.linearRampToValueAtTime(0.09,t+1.3);
    gain.gain.exponentialRampToValueAtTime(0.001,t+1.7);
    // LFO stutter
    var lfo=ctx.createOscillator();var lfoGain=ctx.createGain();
    lfo.frequency.setValueAtTime(6,t);
    lfo.frequency.linearRampToValueAtTime(30,t+1.3);
    lfoGain.gain.setValueAtTime(0.8,t);
    lfoGain.gain.linearRampToValueAtTime(0.1,t+1.3);
    lfo.connect(lfoGain);lfoGain.connect(gain.gain);
    lfo.start(t);lfo.stop(t+1.7);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(t);osc.stop(t+1.7);

    // Detuned twin
    var dt=ctx.createOscillator();var dg=ctx.createGain();
    dt.type='triangle';
    dt.frequency.setValueAtTime(63,t);
    dt.frequency.exponentialRampToValueAtTime(907,t+1.5);
    dg.gain.setValueAtTime(0.0,t);
    dg.gain.linearRampToValueAtTime(0.01,t+0.15);
    dg.gain.linearRampToValueAtTime(0.07,t+1.3);
    dg.gain.exponentialRampToValueAtTime(0.001,t+1.7);
    dt.connect(dg);dg.connect(ctx.destination);
    dt.start(t);dt.stop(t+1.7);

    // Square grit layer
    var sq=ctx.createOscillator();var sqg=ctx.createGain();
    sq.type='square';
    sq.frequency.setValueAtTime(60,t);
    sq.frequency.exponentialRampToValueAtTime(700,t+1.5);
    sqg.gain.setValueAtTime(0.003,t);
    sqg.gain.linearRampToValueAtTime(0.015,t+1.3);
    sqg.gain.exponentialRampToValueAtTime(0.001,t+1.7);
    sq.connect(sqg);sqg.connect(ctx.destination);
    sq.start(t);sq.stop(t+1.7);
  }catch(e){}
}

// Sound 2: Systems online chime — two-tone digital confirmation
function sfxChime(){
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;

    // First tone — clean sine
    var o1=ctx.createOscillator();var g1=ctx.createGain();
    o1.type='sine';
    o1.frequency.setValueAtTime(880,t);
    g1.gain.setValueAtTime(0,t);
    g1.gain.linearRampToValueAtTime(0.15,t+0.02);
    g1.gain.setValueAtTime(0.15,t+0.08);
    g1.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o1.connect(g1);g1.connect(ctx.destination);
    o1.start(t);o1.stop(t+0.35);

    // Second tone — higher, slightly delayed
    var o2=ctx.createOscillator();var g2=ctx.createGain();
    o2.type='sine';
    o2.frequency.setValueAtTime(1318,t+0.1);
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(0.12,t+0.12);
    g2.gain.setValueAtTime(0.12,t+0.18);
    g2.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o2.connect(g2);g2.connect(ctx.destination);
    o2.start(t+0.1);o2.stop(t+0.5);

    // Subtle shimmer on second tone
    var o3=ctx.createOscillator();var g3=ctx.createGain();
    o3.type='sine';
    o3.frequency.setValueAtTime(1322,t+0.1);
    g3.gain.setValueAtTime(0,t);
    g3.gain.linearRampToValueAtTime(0.04,t+0.12);
    g3.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o3.connect(g3);g3.connect(ctx.destination);
    o3.start(t+0.1);o3.stop(t+0.5);
  }catch(e){}
}

// Sound 3: Low idle hum — Archie is alive
function sfxHum(){
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;

    // Deep sine hum
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    var filter=ctx.createBiquadFilter();
    osc.type='sine';
    osc.frequency.setValueAtTime(82,t);
    filter.type='lowpass';
    filter.frequency.setValueAtTime(200,t);
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.04,t+2);
    gain.gain.setValueAtTime(0.04,t+6);
    gain.gain.linearRampToValueAtTime(0,t+10);
    osc.connect(filter);filter.connect(gain);gain.connect(ctx.destination);
    osc.start(t);osc.stop(t+10);

    // Slight detuned layer for warmth
    var o2=ctx.createOscillator();var g2=ctx.createGain();
    o2.type='sine';
    o2.frequency.setValueAtTime(82.5,t);
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(0.02,t+2);
    g2.gain.setValueAtTime(0.02,t+6);
    g2.gain.linearRampToValueAtTime(0,t+10);
    o2.connect(filter);
    o2.start(t);o2.stop(t+10);
  }catch(e){}
}

// ================================
// VISUAL POWER-UP SEQUENCE
// ================================
function triggerReward(){
  // Phase 1: Sound starts, Archie fades in dark (0-0.5s)
  sfxReward();

  var archie=document.getElementById('archieReward');
  setTimeout(function(){
    archie.classList.add('visible');
  },400);

  // Phase 2: Antenna brightens as power builds (0.6-1.2s)
  var antenna=document.getElementById('antennaLED');
  setTimeout(function(){
    antenna.style.transition='opacity 0.6s ease, r 0.6s ease';
    antenna.setAttribute('opacity','0.6');
    antenna.setAttribute('r','5');
  },600);

  // Phase 3: Chest glow flickers on (1.0s)
  var chestGlow=document.getElementById('chestGlow');
  setTimeout(function(){
    chestGlow.style.transition='opacity 0.4s ease';
    chestGlow.setAttribute('opacity','0.08');
  },1000);

  // Phase 4: EYES FIRE ON + CHIME + full antenna (1.7s — the landing)
  setTimeout(function(){
    sfxChime();

    // Micro flash — instant contrast spike
    var phoneInner=document.querySelector('.phone-inner');
    phoneInner.style.background='#0a1220';
    setTimeout(function(){phoneInner.style.background='#000';},80);

    // Scale pop — subtle physical surge
    archie.style.transition='transform 0.12s ease';
    archie.style.transform='scale(1.05)';
    setTimeout(function(){
      archie.style.transition='transform 0.3s ease';
      archie.style.transform='scale(1)';
    },120);

    // Eyes flicker on
    var eyeL=document.getElementById('eyeL');
    var eyeR=document.getElementById('eyeR');
    eyeL.style.animation='eyeFlicker 0.5s ease forwards';
    eyeR.style.animation='eyeFlicker 0.5s ease forwards';

    // Antenna full power
    antenna.setAttribute('opacity','0.9');
    antenna.setAttribute('r','6');

    // Ears light up
    document.getElementById('earL').setAttribute('opacity','0.5');
    document.getElementById('earR').setAttribute('opacity','0.5');

    // Chest brightens
    chestGlow.setAttribute('opacity','0.12');

    // Mouth lights up
    var mouth=document.getElementById('mouth');
    mouth.setAttribute('stroke','#4A90E2');
    mouth.setAttribute('opacity','0.6');

    // Body ambient glow
    var bodyAmbient=document.getElementById('bodyAmbient');
    bodyAmbient.style.transition='opacity 1.5s ease';
    bodyAmbient.setAttribute('opacity','0.04');
  },1700);

  // Phase 5: Breathing hum starts, bob animation, glow settles (2.2s)
  setTimeout(function(){
    sfxAmbientStart();
    archie.querySelector('svg').style.animation='softBob 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite';
  },2200);

  // Phase 6: Foot glow (2.5s)
  setTimeout(function(){
    document.getElementById('footGlowL').style.animation='footPulse 2s infinite';
    document.getElementById('footGlowL').setAttribute('opacity','0.15');
    document.getElementById('footGlowR').style.animation='footPulse 2s infinite';
    document.getElementById('footGlowR').setAttribute('opacity','0.15');
  },2500);

  // === TEXT SEQUENCE ===

  // "You actually did it." (2.3s — let the activation LAND first)
  setTimeout(function(){
    document.getElementById('rw0').classList.add('visible');
  },2300);

  // "You just used AI." (3.3s)
  setTimeout(function(){
    document.getElementById('rw1').classList.add('visible');
  },3300);

  // "Most people haven't even done that yet." (4.5s)
  setTimeout(function(){
    document.getElementById('rw2').classList.add('visible');
  },4500);

  // "You're already ahead ⚡" (5.6s)
  setTimeout(function(){
    document.getElementById('rw3').classList.add('visible');
  },5600);

  // Progress bar (6.6s)
  setTimeout(function(){
    var pb=document.getElementById('progressBump');
    pb.classList.add('visible');
    setTimeout(function(){
      document.getElementById('rewardBar').style.width='3%';
    },200);
  },6600);

  // Eyes dim back down — not enough power to hold them (7.0s)
  setTimeout(function(){
    var eyeL=document.getElementById('eyeL');
    var eyeR=document.getElementById('eyeR');
    eyeL.style.animation='none';
    eyeR.style.animation='none';
    eyeL.style.transition='opacity 2s ease';
    eyeR.style.transition='opacity 2s ease';
    eyeL.setAttribute('opacity','0');
    eyeR.setAttribute('opacity','0');
  },7000);

  // "See you tomorrow" button (7.8s)
  setTimeout(function(){
    document.getElementById('rewardBtn').classList.add('visible');
  },7800);
}

// Sound 4: Settle tone — descending wind-down (~0.5s)
function sfxSettle(){
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;

    // Main descending sweep
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    osc.type='triangle';
    osc.frequency.setValueAtTime(800,t);
    osc.frequency.exponentialRampToValueAtTime(120,t+0.45);
    gain.gain.setValueAtTime(0.08,t);
    gain.gain.linearRampToValueAtTime(0.06,t+0.1);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(t);osc.stop(t+0.5);

    // Soft sub layer underneath
    var sub=ctx.createOscillator();var sg=ctx.createGain();
    sub.type='sine';
    sub.frequency.setValueAtTime(200,t);
    sub.frequency.exponentialRampToValueAtTime(60,t+0.4);
    sg.gain.setValueAtTime(0.04,t);
    sg.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    sub.connect(sg);sg.connect(ctx.destination);
    sub.start(t);sub.stop(t+0.5);
  }catch(e){}
}

// Sound 5: Ambient idle — slow breathing drone (no blip, no constant tone)
var ambientNodes=null;
function sfxAmbientStart(){
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;
    var nodes={};

    // Soft sine — the fundamental breath
    var hum=ctx.createOscillator();var humGain=ctx.createGain();
    hum.type='sine';
    hum.frequency.setValueAtTime(110,t);
    humGain.gain.setValueAtTime(0,t);
    hum.connect(humGain);humGain.connect(ctx.destination);
    hum.start(t);
    nodes.hum=hum;nodes.humGain=humGain;

    // Detuned twin — warmth
    var hum2=ctx.createOscillator();var hum2Gain=ctx.createGain();
    hum2.type='sine';
    hum2.frequency.setValueAtTime(110.4,t);
    hum2Gain.gain.setValueAtTime(0,t);
    hum2.connect(hum2Gain);hum2Gain.connect(ctx.destination);
    hum2.start(t);
    nodes.hum2=hum2;nodes.hum2Gain=hum2Gain;

    // LFO to make it breathe — swells and fades over ~7s
    var lfo=ctx.createOscillator();var lfoGain=ctx.createGain();
    lfo.type='sine';
    lfo.frequency.setValueAtTime(0.14,t); // ~7 second cycle
    lfoGain.gain.setValueAtTime(0.02,t); // amplitude of the swell
    lfo.connect(lfoGain);
    lfoGain.connect(humGain.gain);
    lfoGain.connect(hum2Gain.gain);
    lfo.start(t);
    nodes.lfo=lfo;nodes.lfoGain=lfoGain;

    // Set base level — quiet, LFO rides on top
    humGain.gain.setValueAtTime(0,t);
    humGain.gain.linearRampToValueAtTime(0.018,t+3);
    hum2Gain.gain.setValueAtTime(0,t);
    hum2Gain.gain.linearRampToValueAtTime(0.01,t+3);

    ambientNodes=nodes;
  }catch(e){}
}

function sfxAmbientStop(){
  if(!ambientNodes) return;
  try{
    var ctx=getAudioCtx();var t=ctx.currentTime;
    ['humGain','hum2Gain'].forEach(function(key){
      if(ambientNodes[key]) ambientNodes[key].gain.linearRampToValueAtTime(0,t+0.8);
    });
    setTimeout(function(){
      try{
        ['hum','hum2','lfo'].forEach(function(key){
          if(ambientNodes[key]) ambientNodes[key].stop();
        });
      }catch(e){}
    },900);
    ambientNodes=null;
  }catch(e){}
}

// "See you tomorrow" — settle + transition to home
function goHome(){
  sfxSettle();
  sfxAmbientStop();

  // Fade out the reward overlay
  var overlay=document.getElementById('reward');
  overlay.style.transition='opacity 0.8s ease';
  overlay.style.opacity='0';

  // Show home screen after fade
  setTimeout(function(){
    overlay.style.display='none';
    document.getElementById('homeScreen').style.display='flex';
    document.getElementById('homeScreen').style.opacity='0';
    setTimeout(function(){
      document.getElementById('homeScreen').style.transition='opacity 1.5s ease';
      document.getElementById('homeScreen').style.opacity='1';
    },50);

    // Start ambient hum after a beat
    setTimeout(function(){
      sfxAmbientStart();
    },800);

    // Eye flicker sequence — power tries to hold but can't yet
    var hmEyeL=document.getElementById('hmEyeL');
    var hmEyeR=document.getElementById('hmEyeR');

    // 1.5s after home appears — eyes flicker on
    setTimeout(function(){
      hmEyeL.style.transition='opacity 0.3s ease';
      hmEyeR.style.transition='opacity 0.3s ease';
      hmEyeL.setAttribute('opacity','0.35');
      hmEyeR.setAttribute('opacity','0.35');
    },1500);

    // 1.8s — brief dip (flicker)
    setTimeout(function(){
      hmEyeL.setAttribute('opacity','0.08');
      hmEyeR.setAttribute('opacity','0.08');
    },1800);

    // 2.0s — tries again, a little brighter
    setTimeout(function(){
      hmEyeL.setAttribute('opacity','0.4');
      hmEyeR.setAttribute('opacity','0.4');
    },2000);

    // 2.8s — holds for a moment...
    // 3.2s — then slowly fades out. Not enough power.
    setTimeout(function(){
      hmEyeL.style.transition='opacity 1.5s ease';
      hmEyeR.style.transition='opacity 1.5s ease';
      hmEyeL.setAttribute('opacity','0');
      hmEyeR.setAttribute('opacity','0');
    },3200);
  },800);
}
